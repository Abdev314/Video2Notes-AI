<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1180" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="inputG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="outputG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>

    <filter id="sh" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="960" height="1180" fill="#ffffff"/>

  <!-- ============ INPUT ============ -->
  <g filter="url(#sh)">
    <rect x="340" y="20" width="240" height="60" rx="10" fill="url(#inputG)" stroke="#d97706" stroke-width="2"/>
  </g>
  <text x="460" y="48" text-anchor="middle" font-size="11" fill="#78350f" letter-spacing="2" font-weight="700">INPUT</text>
  <text x="460" y="68" text-anchor="middle" font-size="17" font-weight="700" fill="#78350f">🎥  lecture.mp4</text>

  <!-- arrow to step 1 -->
  <line x1="460" y1="80" x2="460" y2="118" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ============ STEP 1: Audio Extraction ============ -->
  <g filter="url(#sh)">
    <rect x="240" y="120" width="440" height="90" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <rect x="240" y="120" width="52" height="90" rx="10" fill="#2563eb"/>
  </g>
  <text x="266" y="173" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">1</text>
  <text x="312" y="150" font-size="15" font-weight="700" fill="#0f172a">Audio Extraction</text>
  <text x="312" y="170" font-size="11" fill="#64748b" font-style="italic">FFmpeg</text>
  <text x="312" y="190" font-size="12" fill="#334155">Strips video, resamples audio to 16 kHz mono</text>

  <!-- arrow + payload -->
  <line x1="460" y1="210" x2="460" y2="248" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="470" y="232" font-size="11" fill="#6b7280" font-style="italic">audio.wav</text>

  <!-- ============ STEP 2: Transcription ============ -->
  <g filter="url(#sh)">
    <rect x="240" y="250" width="440" height="90" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <rect x="240" y="250" width="52" height="90" rx="10" fill="#2563eb"/>
  </g>
  <text x="266" y="303" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">2</text>
  <text x="312" y="280" font-size="15" font-weight="700" fill="#0f172a">Transcription</text>
  <text x="312" y="300" font-size="11" fill="#64748b" font-style="italic">faster-whisper</text>
  <text x="312" y="320" font-size="12" fill="#334155">Timestamped speech-to-text</text>

  <line x1="460" y1="340" x2="460" y2="378" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="470" y="362" font-size="11" fill="#6b7280" font-style="italic" font-family="Consolas, Monaco, monospace">[(t, text), ...]</text>

  <!-- ============ STEP 3: Scene Detection ============ -->
  <g filter="url(#sh)">
    <rect x="240" y="380" width="440" height="90" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <rect x="240" y="380" width="52" height="90" rx="10" fill="#2563eb"/>
  </g>
  <text x="266" y="433" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">3</text>
  <text x="312" y="410" font-size="15" font-weight="700" fill="#0f172a">Scene Detection</text>
  <text x="312" y="430" font-size="11" fill="#64748b" font-style="italic">PySceneDetect</text>
  <text x="312" y="450" font-size="12" fill="#334155">Visual cut detection across video frames</text>

  <line x1="460" y1="470" x2="460" y2="508" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="470" y="492" font-size="11" fill="#6b7280" font-style="italic" font-family="Consolas, Monaco, monospace">[(start, end), ...]</text>

  <!-- ============ STEP 4: Segment Builder ============ -->
  <g filter="url(#sh)">
    <rect x="240" y="510" width="440" height="90" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <rect x="240" y="510" width="52" height="90" rx="10" fill="#2563eb"/>
  </g>
  <text x="266" y="563" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">4</text>
  <text x="312" y="540" font-size="15" font-weight="700" fill="#0f172a">Segment Builder</text>
  <text x="312" y="560" font-size="11" fill="#64748b" font-style="italic">Plain Python</text>
  <text x="312" y="580" font-size="12" fill="#334155">Merge transcript + scene cuts by timestamp</text>

  <line x1="460" y1="600" x2="460" y2="638" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="470" y="622" font-size="11" fill="#6b7280" font-style="italic" font-family="Consolas, Monaco, monospace">[Segment(id, times, text), ...]</text>

  <!-- ============ STEP 5: Keyframe Extraction ============ -->
  <g filter="url(#sh)">
    <rect x="240" y="640" width="440" height="90" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <rect x="240" y="640" width="52" height="90" rx="10" fill="#2563eb"/>
  </g>
  <text x="266" y="693" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">5</text>
  <text x="312" y="670" font-size="15" font-weight="700" fill="#0f172a">Keyframe Extraction</text>
  <text x="312" y="690" font-size="11" fill="#64748b" font-style="italic">OpenCV</text>
  <text x="312" y="710" font-size="12" fill="#334155">Grab one frame per segment, save as JPEG</text>

  <line x1="460" y1="730" x2="460" y2="768" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="470" y="752" font-size="11" fill="#6b7280" font-style="italic">Segments with image paths</text>

  <!-- ============ STEP 6: AI Analysis ============ -->
  <g filter="url(#sh)">
    <rect x="240" y="770" width="440" height="90" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
    <rect x="240" y="770" width="52" height="90" rx="10" fill="#7c3aed"/>
  </g>
  <text x="266" y="823" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">6</text>
  <text x="312" y="800" font-size="15" font-weight="700" fill="#0f172a">AI Analysis  🧠</text>
  <text x="312" y="820" font-size="11" fill="#64748b" font-style="italic">Ollama + Llama 3.1</text>
  <text x="312" y="840" font-size="12" fill="#334155">Title + summary + key points per segment</text>

  <line x1="460" y1="860" x2="460" y2="898" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="470" y="882" font-size="11" fill="#6b7280" font-style="italic">Fully enriched segments</text>

  <!-- ============ STEP 7: Export ============ -->
  <g filter="url(#sh)">
    <rect x="240" y="900" width="440" height="90" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <rect x="240" y="900" width="52" height="90" rx="10" fill="#2563eb"/>
  </g>
  <text x="266" y="953" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">7</text>
  <text x="312" y="930" font-size="15" font-weight="700" fill="#0f172a">Markdown Export</text>
  <text x="312" y="950" font-size="11" fill="#64748b" font-style="italic">Jinja2</text>
  <text x="312" y="970" font-size="12" fill="#334155">Render markdown from a template</text>

  <line x1="460" y1="990" x2="460" y2="1028" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ============ OUTPUT ============ -->
  <g filter="url(#sh)">
    <rect x="340" y="1030" width="240" height="60" rx="10" fill="url(#outputG)" stroke="#059669" stroke-width="2"/>
  </g>
  <text x="460" y="1058" text-anchor="middle" font-size="11" fill="#064e3b" letter-spacing="2" font-weight="700">OUTPUT</text>
  <text x="460" y="1078" text-anchor="middle" font-size="17" font-weight="700" fill="#064e3b">📝  notes.md</text>

  <!-- ============ Footer ============ -->
  <text x="480" y="1140" text-anchor="middle" font-size="12" fill="#6b7280">
    Each step is a pure function: data flows one direction, from input to output.
  </text>
</svg>
