<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="barLow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="barHigh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="500" fill="#ffffff"/>

  <!-- ============ Title ============ -->
  <text x="450" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">
    CPU Time Across the Pipeline
  </text>
  <text x="450" y="60" text-anchor="middle" font-size="12" fill="#64748b">
    Measured on a 2.5-minute lecture · 16 GB RAM · CPU only, no GPU
  </text>

  <!-- Chart geometry
       Plot area: x 110..820 (710 wide), y 100..380 (280 tall)
       Y scale: 0 s -> y=380 ;  240 s -> y=100  (280 / 240 = 1.1667 px per second)
       Grid at 0, 60, 120, 180, 240
  -->

  <!-- ============ Y-axis grid + labels ============ -->
  <line x1="110" y1="100" x2="820" y2="100" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="100" y="104" text-anchor="end" font-size="11" fill="#6b7280">240s</text>

  <line x1="110" y1="170" x2="820" y2="170" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="100" y="174" text-anchor="end" font-size="11" fill="#6b7280">180s</text>

  <line x1="110" y1="240" x2="820" y2="240" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="100" y="244" text-anchor="end" font-size="11" fill="#6b7280">120s</text>

  <line x1="110" y1="310" x2="820" y2="310" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="100" y="314" text-anchor="end" font-size="11" fill="#6b7280">60s</text>

  <line x1="110" y1="380" x2="820" y2="380" stroke="#334155" stroke-width="2"/>
  <text x="100" y="384" text-anchor="end" font-size="11" fill="#6b7280">0s</text>

  <!-- Y axis label -->
  <text x="40" y="240" text-anchor="middle" font-size="11" fill="#374151"
        transform="rotate(-90 40 240)" letter-spacing="1">DURATION</text>

  <!-- ============ Bars ============
       Scale: 1s = 280/240 = 1.1667 px
       
       Bars (center_x, seconds, label, tool, color):
         1 Audio ext.     165   1     FFmpeg
         2 Transcribe     245  15     faster-whisper
         3 Scene det.     325   4     PySceneDetect
         4 Segments       405   0     Python
         5 Keyframes      485   1     OpenCV
         6 AI analysis    580 200     Ollama + Llama 3.1  (HIGH)
         7 Export         740   0     Jinja2
  -->

  <!-- Bar 1: Audio 1s -->
  <g filter="url(#sh)">
    <rect x="140" y="378.8" width="50" height="1.2" rx="1" fill="url(#barLow)"/>
  </g>
  <text x="165" y="372" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">1s</text>

  <!-- Bar 2: Trans. 15s -->
  <g filter="url(#sh)">
    <rect x="220" y="362.5" width="50" height="17.5" rx="2" fill="url(#barLow)"/>
  </g>
  <text x="245" y="356" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">15s</text>

  <!-- Bar 3: Scene det. 4s -->
  <g filter="url(#sh)">
    <rect x="300" y="375.3" width="50" height="4.7" rx="2" fill="url(#barLow)"/>
  </g>
  <text x="325" y="369" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">4s</text>

  <!-- Bar 4: Segment 0s (show a hairline) -->
  <rect x="380" y="379" width="50" height="1" fill="#93c5fd"/>
  <text x="405" y="372" text-anchor="middle" font-size="10" font-weight="600" fill="#6b7280">~0s</text>

  <!-- Bar 5: Keyframe 1s -->
  <g filter="url(#sh)">
    <rect x="460" y="378.8" width="50" height="1.2" rx="1" fill="url(#barLow)"/>
  </g>
  <text x="485" y="372" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">1s</text>

  <!-- Bar 6: AI 200s ← the big one -->
  <!-- 200 * 1.1667 = 233.3 px -->
  <g filter="url(#sh)">
    <rect x="550" y="146.7" width="60" height="233.3" rx="3" fill="url(#barHigh)"/>
  </g>
  <text x="580" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#6d28d9">200s</text>

  <!-- Callout on the big bar -->
  <g>
    <line x1="620" y1="240" x2="680" y2="240" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="620" cy="240" r="2.5" fill="#7c3aed"/>
    <rect x="683" y="222" width="180" height="38" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="773" y="238" text-anchor="middle" font-size="10" font-weight="700" fill="#5b21b6">7 segments × ~28s each</text>
    <text x="773" y="252" text-anchor="middle" font-size="9" fill="#7c3aed">(first is slowest: model load)</text>
  </g>

  <!-- Bar 7: Export 0s -->
  <rect x="715" y="379" width="50" height="1" fill="#93c5fd"/>
  <text x="740" y="372" text-anchor="middle" font-size="10" font-weight="600" fill="#6b7280">~0s</text>

  <!-- ============ X-axis step labels ============ -->
  <g font-size="10" fill="#0f172a" text-anchor="middle">
    <text x="165" y="402" font-weight="700">1. Audio</text>
    <text x="165" y="416" fill="#64748b">FFmpeg</text>

    <text x="245" y="402" font-weight="700">2. Transcribe</text>
    <text x="245" y="416" fill="#64748b">faster-whisper</text>

    <text x="325" y="402" font-weight="700">3. Scenes</text>
    <text x="325" y="416" fill="#64748b">PySceneDetect</text>

    <text x="405" y="402" font-weight="700">4. Segments</text>
    <text x="405" y="416" fill="#64748b">Python</text>

    <text x="485" y="402" font-weight="700">5. Keyframes</text>
    <text x="485" y="416" fill="#64748b">OpenCV</text>

    <text x="580" y="402" font-weight="700">6. AI analysis</text>
    <text x="580" y="416" fill="#64748b">Ollama + Llama 3.1</text>

    <text x="740" y="402" font-weight="700">7. Export</text>
    <text x="740" y="416" fill="#64748b">Jinja2</text>
  </g>

  <!-- ============ Bottom summary box ============ -->
  <rect x="110" y="445" width="710" height="38" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="465" y="463" text-anchor="middle" font-size="11" fill="#374151">
    <tspan font-weight="700">Total runtime:</tspan> 3 min 41 s.
    <tspan font-weight="700" dx="6">The AI step dominates</tspan> — 90% of the wall-clock time.
  </text>
  <text x="465" y="477" text-anchor="middle" font-size="10" fill="#6b7280">
    On a GPU, both Whisper and the LLM run roughly 10–20× faster. For long videos, that matters.
  </text>
</svg>
