<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="barLow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="barHigh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="500" fill="#ffffff"/>

  <!-- ============ Title ============ -->
  <text x="450" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">
    RAM Usage Across the Pipeline
  </text>
  <text x="450" y="60" text-anchor="middle" font-size="12" fill="#64748b">
    Peak memory per step on a 10-minute lecture
  </text>

  <!-- Chart geometry
       Plot area: x 110..820 (710 wide), y 100..380 (280 tall)
       Y scale: 0 GB -> y=380 ;  8 GB -> y=100  (35 px per GB)
  -->

  <!-- ============ Y-axis grid lines + labels ============ -->
  <!-- 8 GB -->
  <line x1="110" y1="100" x2="820" y2="100" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="100" y="104" text-anchor="end" font-size="11" fill="#6b7280">8 GB</text>
  <!-- 6 GB -->
  <line x1="110" y1="170" x2="820" y2="170" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="100" y="174" text-anchor="end" font-size="11" fill="#6b7280">6 GB</text>
  <!-- 4 GB -->
  <line x1="110" y1="240" x2="820" y2="240" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="100" y="244" text-anchor="end" font-size="11" fill="#6b7280">4 GB</text>
  <!-- 2 GB -->
  <line x1="110" y1="310" x2="820" y2="310" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="100" y="314" text-anchor="end" font-size="11" fill="#6b7280">2 GB</text>
  <!-- 0 GB (baseline) -->
  <line x1="110" y1="380" x2="820" y2="380" stroke="#334155" stroke-width="2"/>
  <text x="100" y="384" text-anchor="end" font-size="11" fill="#6b7280">0 GB</text>

  <!-- Y axis label -->
  <text x="40" y="240" text-anchor="middle" font-size="11" fill="#374151"
        transform="rotate(-90 40 240)" letter-spacing="1">MEMORY</text>

  <!-- ============ Bars ============
       Each step: x center, width 70 px.
       Bar geometry: x = center - 35, y = 380 - (gb * 35), height = gb * 35
       Steps (center_x, gb, label, tool, color_gradient):
         1 Audio ext.   165  0.1   FFmpeg            low
         2 Trans.       245  1.5   faster-whisper    low
         3 Scene det.   325  0.3   PySceneDetect     low
         4 Segment      405  0.1   Python            low
         5 Keyframe     485  0.4   OpenCV            low
         6 AI analysis  580  6.0   Llama 3.1 8B      high
         7 Export       740  0.1   Jinja2            low
  -->

  <!-- Bar 1: Audio ext. 0.1 GB -->
  <g filter="url(#sh)">
    <rect x="140" y="376" width="50" height="4" rx="2" fill="url(#barLow)"/>
  </g>
  <text x="165" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">0.1 GB</text>

  <!-- Bar 2: Trans. 1.5 GB -->
  <g filter="url(#sh)">
    <rect x="220" y="327.5" width="50" height="52.5" rx="2" fill="url(#barLow)"/>
  </g>
  <text x="245" y="321" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">1.5 GB</text>

  <!-- Bar 3: Scene det. 0.3 GB -->
  <g filter="url(#sh)">
    <rect x="300" y="369.5" width="50" height="10.5" rx="2" fill="url(#barLow)"/>
  </g>
  <text x="325" y="363" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">0.3 GB</text>

  <!-- Bar 4: Segment 0.1 GB -->
  <g filter="url(#sh)">
    <rect x="380" y="376" width="50" height="4" rx="2" fill="url(#barLow)"/>
  </g>
  <text x="405" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">0.1 GB</text>

  <!-- Bar 5: Keyframe 0.4 GB -->
  <g filter="url(#sh)">
    <rect x="460" y="366" width="50" height="14" rx="2" fill="url(#barLow)"/>
  </g>
  <text x="485" y="359" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">0.4 GB</text>

  <!-- Bar 6: AI analysis 6.0 GB ← the big one -->
  <g filter="url(#sh)">
    <rect x="550" y="170" width="60" height="210" rx="3" fill="url(#barHigh)"/>
  </g>
  <text x="580" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#6d28d9">6.0 GB</text>

  <!-- Callout arrow pointing to the big bar -->
  <g>
    <line x1="620" y1="240" x2="680" y2="240" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="620" cy="240" r="2.5" fill="#7c3aed"/>
    <rect x="683" y="224" width="180" height="34" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="773" y="240" text-anchor="middle" font-size="10" font-weight="700" fill="#5b21b6">Llama 3.1 held in memory</text>
    <text x="773" y="252" text-anchor="middle" font-size="9" fill="#7c3aed">for the whole AI phase</text>
  </g>

  <!-- Bar 7: Export 0.1 GB -->
  <g filter="url(#sh)">
    <rect x="715" y="376" width="50" height="4" rx="2" fill="url(#barLow)"/>
  </g>
  <text x="740" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">0.1 GB</text>

  <!-- ============ X-axis step labels ============ -->
  <!-- Two-line labels: step number + tool name -->
  <g font-size="10" fill="#0f172a" text-anchor="middle">
    <text x="165" y="402" font-weight="700">1. Audio</text>
    <text x="165" y="416" fill="#64748b">FFmpeg</text>

    <text x="245" y="402" font-weight="700">2. Transcribe</text>
    <text x="245" y="416" fill="#64748b">faster-whisper</text>

    <text x="325" y="402" font-weight="700">3. Scenes</text>
    <text x="325" y="416" fill="#64748b">PySceneDetect</text>

    <text x="405" y="402" font-weight="700">4. Segments</text>
    <text x="405" y="416" fill="#64748b">Python</text>

    <text x="485" y="402" font-weight="700">5. Keyframes</text>
    <text x="485" y="416" fill="#64748b">OpenCV</text>

    <text x="580" y="402" font-weight="700">6. AI analysis</text>
    <text x="580" y="416" fill="#64748b">Ollama + Llama 3.1</text>

    <text x="740" y="402" font-weight="700">7. Export</text>
    <text x="740" y="416" fill="#64748b">Jinja2</text>
  </g>

  <!-- ============ Bottom summary box ============ -->
  <rect x="110" y="445" width="710" height="38" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="465" y="463" text-anchor="middle" font-size="11" fill="#374151">
    <tspan font-weight="700">Peak RAM:</tspan> ~6 GB during AI analysis.
    <tspan font-weight="700" dx="6">Recommended:</tspan> 8 GB minimum, 16 GB ideal.
  </text>
  <text x="465" y="477" text-anchor="middle" font-size="10" fill="#6b7280">
    Steps run sequentially — memory is freed between steps, so only the AI phase hits the peak.
  </text>
</svg>
